<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>Temperature Conversion</h1>
    <input type="number" id="temperature" placeholder="0">
    <button id="convert" onclick="convert()">Convert</button><br>
    <input type="radio" id="celsius" name="unit" value="celsius" checked>
    <label for="celsius">Celsius</label>
    <input type="radio" id="fahrenheit" name="unit" value="fahrenheit">
    <label for="fahrenheit">Fahrenheit</label><br><br>
    <div id="result">Select a unit of conversion</div>
    <script src="practice.js"></script>
</body>
</html>
